version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: risking-db
    environment:
      POSTGRES_USER: risking
      POSTGRES_PASSWORD: risking_password
      POSTGRES_DB: risking_db
    ports:
      - "5432:5432"
    volumes:
      - risking_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U risking -d risking_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: risking-backend
    ports:
      - "3001:3001"
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=risking
      - DB_PASSWORD=risking_password
      - DB_NAME=risking_db
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: risking-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_BACKEND_URL=http://localhost:3001
    depends_on:
      - backend

volumes:
  risking_pgdata:
