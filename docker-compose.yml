version: "3.9"

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://api:4000
      NEXT_PUBLIC_WS_BASE_URL: ws://api:4000
    depends_on:
      api:
        condition: service_started
    networks:
      - risking-net

  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: development
      PORT: 4000
      DATABASE_URL: postgres://postgres:postgres@db:5432/risking
      REDIS_URL: redis://redis:6379
      JWT_SECRET: change-me-in-prod
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - risking-net

  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: risking
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - risking-net

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - risking-net

volumes:
  db-data:
  redis-data:

networks:
  risking-net:
