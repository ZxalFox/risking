version: '3.8'

services:
  db:
    image: postgres:15
    container_name: risking_db
    environment:
      POSTGRES_USER: risking_user
      POSTGRES_PASSWORD: risking_password
      POSTGRES_DB: risking_db
    ports:
      - "5432:5432"
    volumes:
      - risking_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U risking_user -d risking_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  risking_data:
